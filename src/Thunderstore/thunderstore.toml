[config]
schemaVersion = "0.0.1"

[general]
repository = "https://thunderstore.io"

[package]
versionNumber = "1.0.5"
namespace = "saitogo"
name = "REPOJapaneseTranslation"
description = "GameVersion v0.4.2対応 - R.E.P.O.の日本語化Modです。ゲーム内テキストを日本語に翻訳します。"
websiteUrl = "https://github.com/saitogo555/repo-japanese-translation"
containsNsfwContent = false

[package.dependencies]
BepInEx-BepInExPack = "5.4.2305"

[build]
icon = "../../icon.png"
readme = "../../README.md"
outdir = "../../artifacts/thunderstore/"

[[build.copy]]
source = "../bin/Release/netstandard2.1/REPOJapaneseTranslation.dll"
target = "/"

[[build.copy]]
source = "../fonts/NotoSansJP-Regular-subset.ttf"
target = "/"

[[build.copy]]
source = "../config/REPOJapaneseTranslation.cfg"
target = "/"

[[build.copy]]
source = "../../CHANGELOG.md"
target = "/"

[[build.copy]]
source = "../../LICENSE"
target = "/"

[publish]
communities = ["repo"]
[publish.categories]
repo = ["mods","misc", "clientside", "ai-generated"]
