[config]
schemaVersion = "1.0.0"

[general]
repository = "https://thunderstore.io"

[package]
namespace = "saitogo"
name = "REPOJapaneseTranslation"
description = "R.E.P.O.の日本語化Modです。ゲーム内テキストを日本語に翻訳します。Japanese localization mod for R.E.P.O."
websiteUrl = "https://github.com/saitogo555/repo-japanese-translation"
containsNsfwContent = false

[package.dependencies]
BepInEx-BepInExPack = "5.4.2305"
Zehs-REPOLib = "4.0.0"

[build]
icon = "../../icon.png"
readme = "../../README.md"
outdir = "../../artifacts/thunderstore/"

[[build.copy]]
source = "../../artifacts/bin/REPOJapaneseTranslation/release/REPOJapaneseTranslation.dll"
target = "plugins/REPOJapaneseTranslation/"

[[build.copy]]
source = "../../src/REPOJapaneseTranslation/fonts/"
target = "plugins/REPOJapaneseTranslation/fonts/"

[[build.copy]]
source = "../../src/REPOJapaneseTranslation/config/REPOJapaneseTranslation.cfg"
target = "config/"

[[build.copy]]
source = "../../CHANGELOG.md"
target = "/"

[[build.copy]]
source = "../../LICENSE.txt"
target = "/"

[publish]
communities = ["repo"]
[publish.categories]
repo = ["mods", "misc"]
